query GetSystemResources {
  getSystemResources {
    cpu {
      total
      available
    }
    memory {
      total
      available
    }
    disk {
      total
      available
      used
    }
  }
}

query GetNodeInventory {
  nodeInventorySummary {
    totalNodes
    onlineNodes
    staleNodes
    totalCores
    totalRam
    totalDisks
  }
  nodes {
    id
    name
    role
    status
    currentRaid
    nextRaid
    maintenanceMode
    health
    cores
    ram
    availableCores
    availableRamGB
    machineCount
    runningMachineCount
    diskCount
    healthyDiskCount
    updatedAt
    disks {
      id
      path
      status
      updatedAt
    }
  }
}
