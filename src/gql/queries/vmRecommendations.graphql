query getVMRecommendations(
  $vmId: ID!
  $filter: RecommendationFilterInput
  $refresh: Boolean
) {
  getVMRecommendations(
    vmId: $vmId
    filter: $filter
    refresh: $refresh
  ) {
    id
    machineId
    snapshotId
    type
    text
    actionText
    data
    createdAt
  }
}

# Global recommendation count for notification bell
query getPendingRecommendationCount {
  pendingRecommendationCount
}

# Global recommendations for dropdown
query globalPendingRecommendations($limit: Int) {
  globalPendingRecommendations(limit: $limit) {
    id
    machineId
    machineName
    type
    text
    actionText
    severity
    data
    createdAt
  }
}