# ============================================================================
# AUTOMATION QUERIES
# ============================================================================

query GetAutomation($id: ID!) {
  automation(id: $id) {
    id
    name
    description
    blocklyWorkspace
    generatedCode
    isCompiled
    compiledCode
    compilationError
    targetScope
    department {
      id
      name
    }
    targets {
      id
      machine {
        id
        name
      }
    }
    status
    isEnabled
    priority
    cooldownMinutes
    recommendationType
    recommendationText
    recommendationActionText
    automationScripts {
      id
      script {
        id
        name
        os
      }
      systemScript {
        id
        displayName
      }
      os
      executionOrder
      isEnabled
      executeOnTrigger
    }
    executionCount
    lastTriggeredAt
    triggerRate
    createdBy {
      id
      name
    }
    approvedBy {
      id
      name
    }
    approvedAt
    createdAt
    updatedAt
  }
}

query GetAutomations($filters: AutomationFiltersInput) {
  automations(filters: $filters) {
    id
    name
    description
    status
    isEnabled
    targetScope
    department {
      id
      name
    }
    executionCount
    lastTriggeredAt
    triggerRate
    createdAt
    updatedAt
  }
}

query GetAutomationExecutions(
  $filters: AutomationExecutionFiltersInput
  $limit: Int
  $offset: Int
) {
  automationExecutions(filters: $filters, limit: $limit, offset: $offset) {
    id
    automationId
    machine {
      id
      name
    }
    triggerReason
    evaluationResult
    status
    evaluationTimeMs
    error
    triggeredAt
    completedAt
  }
}

query GetAutomationExecution($id: ID!) {
  automationExecution(id: $id) {
    id
    automationId
    machine {
      id
      name
    }
    snapshot {
      id
      snapshotDate
    }
    triggerReason
    evaluationResult
    status
    contextSnapshot
    evaluationTimeMs
    scriptExecution {
      id
      status
    }
    error
    triggeredAt
    evaluatedAt
    completedAt
  }
}

# ============================================================================
# CUSTOM BLOCK QUERIES
# ============================================================================

query GetCustomBlock($id: ID!) {
  customBlock(id: $id) {
    id
    name
    displayName
    description
    category
    blockDefinition
    generatorCode
    inputs {
      name
      type
      label
      required
      defaultValue
    }
    outputType
    supportedOS
    isBuiltIn
    isEnabled
    createdBy {
      id
      name
    }
    createdAt
    updatedAt
  }
}

query GetCustomBlocks($category: String, $includeBuiltIn: Boolean) {
  customBlocks(category: $category, includeBuiltIn: $includeBuiltIn) {
    id
    name
    displayName
    description
    category
    blockDefinition
    inputs {
      name
      type
      label
      required
      defaultValue
    }
    outputType
    supportedOS
    isBuiltIn
    isEnabled
  }
}

# ============================================================================
# TOOLBOX QUERY
# ============================================================================

query GetBlocklyToolbox {
  blocklyToolbox {
    categories {
      name
      colour
      blocks {
        type
        message0
        args0
        output
        previousStatement
        nextStatement
        colour
        tooltip
        helpUrl
      }
    }
  }
}

# ============================================================================
# CODE PREVIEW QUERIES
# ============================================================================

query PreviewGeneratedCode($blocklyWorkspace: JSONObject!) {
  previewGeneratedCode(blocklyWorkspace: $blocklyWorkspace)
}

query ValidateWorkspace($blocklyWorkspace: JSONObject!) {
  validateWorkspace(blocklyWorkspace: $blocklyWorkspace) {
    isValid
    errors {
      blockId
      message
    }
    warnings {
      blockId
      message
    }
  }
}

# ============================================================================
# RECOMMENDATION QUERIES
# ============================================================================

query GetRecommendation($id: ID!) {
  recommendation(id: $id) {
    id
    automationId
    machine {
      id
      name
    }
    execution {
      id
      status
    }
    title
    description
    severity
    status
    userAction
    actionTakenBy {
      id
      name
    }
    actionTakenAt
    snoozeUntil
    dismissReason
    script {
      id
      name
      os
    }
    systemScript {
      id
      displayName
    }
    scriptExecution {
      id
      status
    }
    autoResolvedAt
    autoResolveReason
    createdAt
    updatedAt
  }
}

query GetRecommendations($filters: RecommendationFiltersInput, $limit: Int) {
  recommendations(filters: $filters, limit: $limit) {
    id
    automationId
    machine {
      id
      name
    }
    title
    description
    severity
    status
    userAction
    actionTakenBy {
      id
      name
    }
    actionTakenAt
    snoozeUntil
    autoResolvedAt
    autoResolveReason
    createdAt
  }
}

query GetPendingRecommendations($machineId: ID!) {
  pendingRecommendations(machineId: $machineId) {
    id
    title
    description
    severity
    status
    machine {
      id
      name
    }
    script {
      id
      name
    }
    systemScript {
      id
      displayName
    }
    createdAt
  }
}

query GlobalPendingRecommendations {
  recommendations(filters: { status: PENDING }) {
    id
    title
    description
    severity
    status
    machine {
      id
      name
    }
    script {
      id
      name
    }
    systemScript {
      id
      displayName
    }
    createdAt
  }
}

query GetPendingRecommendationCount($machineId: ID) {
  pendingRecommendationCount(machineId: $machineId)
}

# ============================================================================
# SYSTEM SCRIPT QUERIES
